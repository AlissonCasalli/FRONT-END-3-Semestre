<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos - Exercício 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ✅ Botão Voltar -->
    <a href="../exerc3/index.html" class="btn-voltar">← Voltar ao Portfólio</a>

    <div class="container">
        <h1>Galeria de Fotos</h1>
        <div class="gallery">
            <figure onclick="openModal('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800')">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" alt="Natureza">
                <figcaption>Montanha ao Amanhecer</figcaption>
            </figure>
            <figure onclick="openModal('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800')">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400" alt="Cidade">
                <figcaption>Cidade Futurista</figcaption>
            </figure>
            <figure onclick="openModal('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800')">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400" alt="Mar">
                <figcaption>Oceano Azul</figcaption>
            </figure>
            <figure onclick="openModal('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800')">
                <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400" alt="Pôr do sol">
                <figcaption>Pôr do Sol na Praia</figcaption>
            </figure>
            <figure onclick="openModal('https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=800')">
                <img src="https://i.blogs.es/f1e93d/gettyimages-2210544624/500_333.jpeg" alt="Galáxia">
                <figcaption>Galáxia Espiral</figcaption>
            </figure>
            <figure onclick="openModal('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800')">
                <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=400" alt="Floresta">
                <figcaption>Floresta Mística</figcaption>
            </figure>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <img id="modalImage" src="" alt="Imagem em tela cheia">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>

</body>
</html>
