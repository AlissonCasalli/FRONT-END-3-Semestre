<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos - Exercício 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a href="../exerc3/index.html" class="btn-voltar">← Voltar ao Portfólio</a>

    <header>
        <h1>Galeria de Fotos</h1>
        <p>Exercício 12 • <strong>&lt;figure&gt;</strong> + <strong>display</strong></p>
    </header>

    <div class="container">
        <div class="gallery">
            <figure onclick="openModal('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800')">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" alt="Natureza">
                <figcaption>Montanha ao Amanhecer</figcaption>
            </figure>

            <figure onclick="openModal('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800')">
                <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=400" alt="Cidade">>
                <figcaption>Cidade Futurista</figcaption>
            </figure>

            <figure onclick="openModal('https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800')">
                <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=400 alt=" Mar">>
                <figcaption>Oceano Azul</figcaption>
            </figure>

            <figure onclick="openModal('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800')">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400" alt="Praia">
                <figcaption>Pôr do sol na praia</figcaption>
            </figure>

            <figure onclick="openModal('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=800')">
                <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=400" alt="Espaço">
                <figcaption>Espaço Profundo</figcaption>
            </figure>

            <figure onclick="openModal('https://images.unsplash.com/photo-1448375240586-882707db888b?w=800')">
                <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=400" alt="Floresta">
                <figcaption>Floresta Misteriosa</figcaption>
            </figure>

        </div>
    </div>

    <div id="imageModal" class="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <img id="modalImage" src="" alt="Imagem em tela cheia">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        document.getElementById('imageModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });
    </script>

</body>

</html>
